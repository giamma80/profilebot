services:
  # === Infra (always started) ===
  qdrant:
    image: qdrant/qdrant:latest
    container_name: profilebot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - profilebot
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: profilebot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - profilebot
    restart: unless-stopped

  # === App services (only with: docker compose --profile full up) ===
  api:
    profiles: ["full"]
    build: .
    container_name: profilebot-api
    working_dir: /app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - SCRAPER_BASE_URL=http://scraper-service:8001
    extra_hosts:
      - "scraper-service:host-gateway"
    depends_on:
      - redis
      - qdrant
    networks:
      - profilebot
    restart: unless-stopped

  celery-worker:
    profiles: ["full"]
    build: .
    container_name: profilebot-celery-worker
    working_dir: /app
    user: "1000:1000"
    command: celery -A src.services.embedding.celery_app worker -l info -c ${CELERY_WORKER_CONCURRENCY:-4} -E
    volumes:
      - ./:/app
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - SCRAPER_BASE_URL=http://scraper-service:8001
    extra_hosts:
      - "scraper-service:host-gateway"
    depends_on:
      - redis
      - qdrant
    networks:
      - profilebot
    restart: unless-stopped

  celery-beat:
    profiles: ["full"]
    build: .
    container_name: profilebot-celery-beat
    working_dir: /app
    command: celery -A src.services.embedding.celery_app beat -l info
    volumes:
      - ./:/app
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - celery-worker
    networks:
      - profilebot
    restart: unless-stopped

  flower:
    profiles: ["full"]
    build: .
    container_name: profilebot-flower
    working_dir: /app
    command: celery -A src.services.embedding.celery_app flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - ./:/app
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - celery-worker
    networks:
      - profilebot
    restart: unless-stopped

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    container_name: profilebot-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/monitoring/alerts:/etc/prometheus/alerts:ro
    networks:
      - profilebot
    restart: unless-stopped

  alertmanager:
    profiles: ["monitoring"]
    image: prom/alertmanager:latest
    container_name: profilebot-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./config/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    env_file: .env
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --log.level=info
    networks:
      - profilebot
    restart: unless-stopped

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    container_name: profilebot-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - profilebot
    restart: unless-stopped

  redis-exporter:
    profiles: ["monitoring"]
    image: oliver006/redis_exporter:latest
    container_name: profilebot-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    networks:
      - profilebot
    restart: unless-stopped

  celery-exporter:
    profiles: ["monitoring"]
    image: danihodovic/celery-exporter:latest
    container_name: profilebot-celery-exporter
    command: ["--broker-url=redis://redis:6379/0"]
    ports:
      - "9808:9808"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
    networks:
      - profilebot
    restart: unless-stopped

networks:
  profilebot:
    driver: bridge

volumes:
  qdrant_storage:
  redis_data:
  grafana_data:
  prometheus_multiproc:
