services:
  # === Infra (always started) ===
  qdrant:
    image: qdrant/qdrant:latest
    container_name: profilebot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - profilebot
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: profilebot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - profilebot
    restart: unless-stopped

  # === App services (only with: docker compose --profile full up) ===
  api:
    profiles: ["full"]
    build: .
    container_name: profilebot-api
    working_dir: /app
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - SCRAPER_BASE_URL=http://scraper-service:8001
    extra_hosts:
      - "scraper-service:host-gateway"
    depends_on:
      - redis
      - qdrant
    networks:
      - profilebot
    restart: unless-stopped

  celery-worker:
    profiles: ["full"]
    build: .
    container_name: profilebot-celery-worker
    working_dir: /app
    command: celery -A src.services.embedding.celery_app worker -l info -c 4
    volumes:
      - ./:/app
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - SCRAPER_BASE_URL=http://scraper-service:8001
    extra_hosts:
      - "scraper-service:host-gateway"
    depends_on:
      - redis
      - qdrant
    networks:
      - profilebot
    restart: unless-stopped

  celery-beat:
    profiles: ["full"]
    build: .
    container_name: profilebot-celery-beat
    working_dir: /app
    command: celery -A src.services.embedding.celery_app beat -l info
    volumes:
      - ./:/app
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - celery-worker
    networks:
      - profilebot
    restart: unless-stopped

  flower:
    profiles: ["full"]
    build: .
    container_name: profilebot-flower
    working_dir: /app
    command: celery -A src.services.embedding.celery_app flower --port=5555
    ports:
      - "5555:5555"
    volumes:
      - ./:/app
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - celery-worker
    networks:
      - profilebot
    restart: unless-stopped

networks:
  profilebot:
    driver: bridge

volumes:
  qdrant_storage:
  redis_data:
