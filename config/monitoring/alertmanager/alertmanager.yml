global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "priority"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "log-only"
  routes:
    - matchers:
        - priority="P1"
      receiver: "log-only"
      group_wait: 10s
      group_interval: 2m
      repeat_interval: 1h
    - matchers:
        - priority="P2"
      receiver: "log-only"
      group_wait: 1m
      group_interval: 15m
      repeat_interval: 2h
    - matchers:
        - priority="P3"
      receiver: "log-only"

receivers:
  - name: "log-only"
    webhook_configs: []
