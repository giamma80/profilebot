version: 1
workflow_id: res_id_ingestion
schedule: "0 */4 * * *"
best_effort_chord: true
min_success_ratio: 0.8

nodes:
  - id: fetch_res_ids
    task: scraper.fetch_inside_res_ids

  - id: inside_fanout
    task: workflow.fanout_by_res_id
    depends_on: [fetch_res_ids]
    params:
      options:
        callback_task: embedding.index_from_scraper
        on_error_task: workflow.log_failed_profiles
        min_success_ratio: 0.8
    fanout:
      source: redis:profilebot:scraper:inside:res_ids
      task: scraper.refresh_inside_profile
      parameter_name: res_id

  - id: export_availability
    task: scraper.export_availability_csv

  - id: export_reskilling
    task: scraper.export_reskilling_csv
