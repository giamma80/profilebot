version: 1
workflow_id: res_id_ingestion
schedule: "0 */4 * * *"

nodes:
  - id: fetch_res_ids
    task: scraper.inside_refresh

  - id: inside_fanout
    task: workflow.fanout
    depends_on: [fetch_res_ids]
    fanout:
      source: redis:profilebot:scraper:inside:res_ids
      task: scraper.inside_refresh_item
      parameter_name: res_id

  - id: export_availability
    task: scraper.availability_csv_refresh

  - id: export_reskilling
    task: scraper.reskilling_csv_refresh

  - id: embed_all
    task: embedding.embed_from_scraper
    depends_on: [inside_fanout]
